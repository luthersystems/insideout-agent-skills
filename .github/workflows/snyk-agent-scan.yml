name: Snyk Agent Scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  snyk-agent-scan:
    name: Scan agent skills
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Scan skills for security issues
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: uvx snyk-agent-scan@latest --skills ./SKILL.md --ci
        # W012 (external MCP dependency) is inherent to any MCP-based skill
        # and cannot be resolved. Allow the scan to report findings without
        # blocking the build.
        continue-on-error: true
